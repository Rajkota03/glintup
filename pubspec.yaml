name: glintup
description: "Your daily dose of learning. Then you're done."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Supabase
  supabase_flutter: ^2.9.0

  # Local Storage
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.5

  # UI/UX
  flutter_card_swiper: ^7.0.1
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_markdown: ^0.7.6
  lottie: ^3.3.1
  flutter_svg: ^2.0.17
  percent_indicator: ^4.2.3
  google_fonts: ^6.2.1
  smooth_page_indicator: ^1.2.0+3

  # Payments
  razorpay_flutter: ^1.3.7

  # Notifications (local only — no Firebase needed)
  flutter_local_notifications: ^18.0.1

  # Utilities
  intl: ^0.20.2
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.7
  uuid: ^4.5.1
  connectivity_plus: ^6.1.4
  timeago: ^3.7.0
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  freezed: ^2.5.8
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
